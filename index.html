<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Home · Spending Pulse</title>
  <meta name="description" content="Home for Spending Pulse.">
  <style>
:root{
  --bg1:#eef3ff;
  --bg2:#e8fbf5;
  --card:#ffffff;
  --text:#101828;
  --muted:#667085;
  --accent:#1177ff;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  color:var(--text);
  background:
    radial-gradient(900px 500px at 50% 0%, rgba(17,119,255,.12), transparent 60%),
    linear-gradient(135deg, var(--bg1), var(--bg2));
  min-height:100vh;
}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}
.wrap{max-width:900px;margin:0 auto;padding:32px 20px 72px}
.topbar{display:flex;justify-content:space-between;align-items:center;gap:16px;margin-bottom:28px}
.brand{font-weight:800;letter-spacing:-0.03em;font-size:20px;color:var(--text)}
.nav{display:flex;gap:16px;flex-wrap:wrap}
.nav a{color:var(--muted);font-weight:600}
.card{
  background:rgba(255,255,255,.84);
  backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,.6);
  box-shadow:0 18px 50px rgba(16,24,40,.08);
  border-radius:28px;
  padding:28px;
}
.hero{padding:40px 32px}
h1{font-size:44px;line-height:1.05;letter-spacing:-0.04em;margin:0 0 12px}
.lead{font-size:18px;line-height:1.6;color:var(--muted);margin:0;max-width:720px}
.meta{margin-top:16px;color:var(--muted);font-size:14px}
.section{margin-top:18px}
.section h2{margin:0 0 10px;font-size:24px;letter-spacing:-0.02em}
.section p,.section li{color:#344054;line-height:1.7;font-size:16px}
.section ul{margin:8px 0 0 22px;padding:0}
.footer{margin-top:22px;color:var(--muted);font-size:14px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:18px;margin-top:24px}
.linkcard{
  display:block;background:rgba(255,255,255,.84);border:1px solid rgba(255,255,255,.7);
  border-radius:24px;padding:22px;box-shadow:0 12px 36px rgba(16,24,40,.06)
}
.linkcard h2{margin:0 0 8px;font-size:24px;letter-spacing:-0.02em;color:var(--text)}
.linkcard p{margin:0;color:var(--muted);line-height:1.6}
.note{margin-top:22px;padding:16px 18px;border-radius:18px;background:rgba(17,119,255,.06);color:#26435e;border:1px solid rgba(17,119,255,.12)}
code{background:rgba(16,24,40,.06);padding:2px 6px;border-radius:8px}
@media (max-width: 640px){
  .topbar{align-items:flex-start;flex-direction:column}
  h1{font-size:34px}
  .hero{padding:28px 22px}
  .card{padding:22px}
}
</style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <a class="brand" href="index.html">Spending Pulse</a>
      <nav class="nav" aria-label="Legal navigation">
        <a href="index.html">Home</a>
        <a href="terms.html">Terms</a>
        <a href="privacy.html">Privacy</a>
      </nav>
    </div>
    
<section class="card hero">
  <h1>Spending Pulse</h1>
  <!-- <p class="lead">Legal pages for the Spending Pulse app.</p> -->
  <div class="grid">
    <a class="linkcard" href="terms.html">
      <h2>Terms &amp; Conditions</h2>
      <!-- <p>Rules for using Spending Pulse, purchases, subscriptions, acceptable use, and liability limits.</p> -->
    </a>
    <a class="linkcard" href="privacy.html">
      <h2>Privacy Policy</h2>
      <!-- <p>How Spending Pulse handles app data, device storage, optional sync, and your controls over that data.</p> -->
    </a>
  </div>
  <div class="meta">Last updated: March 13, 2026</div>
</section>

  </div>
</body>
</html>
